<!DOCTYPE html>
<html>
<head>
    <title>Prim's MST Visualizer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
       .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #3b82f6;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }
        h1 {
            color: #f87171;
            margin: 20px 0;
            font-size: 2.5rem;
        }
      .controls {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            margin: 20px auto;
            max-width: 900px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            align-items: center;
        }
        input, button {
            padding: 10px 15px;
            border-radius: 8px;
            border: 2px solid #334155;
            background: #1e293b;
            color: white;
            font-size: 14px;
        }
        button {
            background: #3b82f6;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #2563eb; }
        #graph {
            margin: 20px auto;
            border: 3px solid #334155;
            border-radius: 12px;
            background: #1e293b;
            display: block;
        }
      .node {
            fill: #3b82f6;
            stroke: white;
            stroke-width: 3;
            transition: all 0.3s;
        }
      .node.in-mst {
            fill: #8b5cf6;
        }
      .node.current {
            fill: #f59e0b;
            stroke-width: 5;
        }
      .edge {
            stroke: #475569;
            stroke-width: 3;
            transition: all 0.3s;
        }
      .edge.in-mst {
            stroke: #22c55e;
            stroke-width: 5;
        }
      .edge.checking {
            stroke: #f59e0b;
            stroke-width: 5;
        }
        text {
            fill: white;
            font-size: 16px;
            font-weight: bold;
            pointer-events: none;
        }
      .info {
            margin: 20px;
            font-size: 18px;
        }
      .message { color: #22d3ee; font-weight: bold; }
      .weight { color: #94a3b8; margin-top: 10px; }
      .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
      .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
      .legend-box {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <a href="/" class="back-btn">← Back to Home</a>
    <h1>Prim's Algorithm - Minimum Spanning Tree</h1>

    <div class="controls">
        <label>Edges (u-v-w):</label>
        <input type="text" id="edges" value="0-1-4,0-2-3,1-2-1,1-3-2,2-3-4,2-4-5,3-4-7,3-5-6,4-5-9" style="width:400px;">
        <label>Start:</label>
        <input type="number" id="start" value="0" min="0" style="width:60px;">
        <button onclick="load()">Run Prim's</button>
        <button onclick="play()">▶ Play</button>
        <button onclick="pause()">⏸ Pause</button>
        <button onclick="next()">Next →</button>
        <button onclick="reset()">Reset</button>
    </div>

    <div class="info">
        <div class="message" id="msg">Enter edges and click Run</div>
        <div class="weight" id="totalWeight">Total MST Weight: 0</div>
        <div id="step" style="color:#94a3b8;margin-top:5px;"></div>
    </div>

    <svg id="graph" width="800" height="500"></svg>

    <div class="legend">
        <div class="legend-item"><div class="legend-box" style="background:#3b82f6;"></div> Unvisited Node</div>
        <div class="legend-item"><div class="legend-box" style="background:#f59e0b;"></div> Current Node</div>
        <div class="legend-item"><div class="legend-box" style="background:#8b5cf6;"></div> In MST</div>
        <div class="legend-item"><div class="legend-box" style="background:#22c55e;"></div> MST Edge</div>
        <div class="legend-item"><div class="legend-box" style="background:#f59e0b;"></div> Checking Edge</div>
    </div>

    <script>
        let steps = [], idx = 0, timer = null;
        // Node positions for visualization
        const positions = [
            [150, 250], // 0
            [300, 100], // 1
            [300, 400], // 2
            [500, 100], // 3
            [500, 400], // 4
            [650, 250] // 5
        ];

        async function load() {
            const edges = document.getElementById('edges').value;
            const start = document.getElementById('start').value;

            if (!edges) {
                alert("Edges daal bhai");
                return;
            }

            try {
                document.getElementById('msg').textContent = "Loading...";
                const res = await fetch(`/graph/prims?start=${start}&edges=${edges}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                steps = await res.json();
                idx = 0;
                draw();
                document.getElementById('msg').textContent = `Loaded ${steps.length} steps. Click Play!`;
            } catch (err) {
                document.getElementById('msg').textContent = "Error: Backend chalu hai?";
                console.error(err);
            }
        }

        function draw() {
            if (idx >= steps.length) {
                pause();
                return;
            }

            const s = steps[idx];
            document.getElementById('step').textContent = `Step: ${idx+1} / ${steps.length}`;
            document.getElementById('msg').textContent = s.message;
            document.getElementById('totalWeight').textContent = `Total MST Weight: ${s.totalWeight || 0}`;

            const svg = document.getElementById('graph');
            svg.innerHTML = '';

            const edgeList = document.getElementById('edges').value.split(',');

            // Draw all edges first
            edgeList.forEach(e => {
                const [u, v, w] = e.split('-').map(Number);
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', positions[u][0]);
                line.setAttribute('y1', positions[u][1]);
                line.setAttribute('x2', positions[v][0]);
                line.setAttribute('y2', positions[v][1]);
                line.setAttribute('class', 'edge');

                // Color logic for edges
                if (s.mstEdges && s.mstEdges.some(edge => (edge[0]===u && edge[1]===v) || (edge[0]===v && edge[1]===u))) {
                    line.classList.add('in-mst');
                }
                if (s.checkingEdge && ((s.checkingEdge[0]===u && s.checkingEdge[1]===v) || (s.checkingEdge[0]===v && s.checkingEdge[1]===u))) {
                    line.classList.add('checking');
                }

                svg.appendChild(line);

                // Edge weight label
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', (positions[u][0] + positions[v][0]) / 2);
                text.setAttribute('y', (positions[u][1] + positions[v][1]) / 2 - 5);
                text.setAttribute('text-anchor', 'middle');
                text.textContent = w;
                svg.appendChild(text);
            });

            // Draw nodes on top
            for (let i = 0; i < positions.length; i++) {
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', positions[i][0]);
                circle.setAttribute('cy', positions[i][1]);
                circle.setAttribute('r', 25);
                circle.setAttribute('class', 'node');

                // Color logic for nodes
                if (s.inMst && s.inMst.includes(i)) circle.classList.add('in-mst');
                if (i === s.currentNode) circle.classList.add('current');

                svg.appendChild(circle);

                // Node label
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', positions[i][0]);
                text.setAttribute('y', positions[i][1] + 6);
                text.setAttribute('text-anchor', 'middle');
                text.textContent = i;
                svg.appendChild(text);
            }
        }

        function play() {
            if (timer || steps.length === 0) return;
            timer = setInterval(() => {
                if (idx < steps.length - 1) {
                    idx++;
                    draw();
                } else {
                    pause();
                    document.getElementById('msg').textContent = "MST Complete! 🎉";
                }
            }, 800);
        }

        function pause() {
            clearInterval(timer);
            timer = null;
        }

        function next() {
            pause();
            if (idx < steps.length - 1) {
                idx++;
                draw();
            }
        }

        function reset() {
            pause();
            idx = 0;
            if (steps.length > 0) draw();
        }
    </script>
</body>
</html>
